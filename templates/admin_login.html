<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — {{ owner.brand_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-login-body">
  <div class="admin-login-bg"></div>
  <div class="admin-login-card">
    <div class="admin-login-brand">{{ owner.brand_name }}</div>
    <h1 class="admin-login-title">Панель управления</h1>
    <p class="admin-login-hint">Введите ключ доступа или откройте секретную ссылку с ключом.</p>
    <form id="loginForm" class="admin-login-form" autocomplete="off">
      <label class="admin-label" for="password">Ключ</label>
      <input type="password" id="password" class="admin-input" placeholder="••••••••" required>
      <button type="submit" class="admin-btn admin-btn-primary" id="loginBtn">Войти</button>
    </form>
    <p class="admin-login-error hidden" id="loginError"></p>
    <p class="admin-login-foot"><a href="{{ url_for('landing') }}">На главную</a></p>
  </div>
  <script src="{{ url_for('static', filename='js/admin_login.js') }}" defer></script>
</body>
</html>
