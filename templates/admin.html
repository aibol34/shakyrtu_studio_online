<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — {{ owner.brand_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-body">
  <div class="admin-bg"></div>
  <div class="admin-layout">
    <header class="admin-top">
      <div class="admin-top-brand">
        <span class="admin-badge">Console</span>
        <h1 class="admin-top-title">{{ owner.brand_name }}</h1>
      </div>
      <div class="admin-top-actions">
        <a class="admin-text-link" href="{{ url_for('landing') }}">Сайт</a>
        <button type="button" class="admin-btn admin-btn-ghost" id="logoutBtn">Выйти</button>
      </div>
    </header>

    <section class="admin-panel">
      <div class="admin-panel-head">
        <h2>Новый альбом</h2>
        <p class="admin-muted">Вставьте ссылку на папку Google Drive — она станет отдельной галереей.</p>
      </div>
      <div class="admin-row">
        <input type="text" id="folderLink" class="admin-input admin-input-wide" placeholder="https://drive.google.com/drive/folders/...">
        <button type="button" class="admin-btn admin-btn-primary" id="addAlbumBtn">Подключить</button>
      </div>
      <div id="addResult" class="admin-result hidden"></div>
    </section>

    <section class="admin-panel">
      <div class="admin-panel-head admin-panel-head-row">
        <div>
          <h2>Альбомы</h2>
          <p class="admin-muted">Период публикации — 30 дней. Просроченные подсвечены.</p>
        </div>
        <button type="button" class="admin-btn admin-btn-ghost" id="refreshBtn">Обновить</button>
      </div>

      <div class="admin-stats">
        <div class="admin-stat"><span id="statTotal">0</span><small>Всего</small></div>
        <div class="admin-stat admin-stat-ok"><span id="statActive">0</span><small>Активные</small></div>
        <div class="admin-stat admin-stat-warn"><span id="statExpired">0</span><small>30+ дней</small></div>
      </div>

      <div id="albumsList" class="admin-albums">
        <div class="admin-loading">Загрузка…</div>
      </div>
    </section>
  </div>

  <script>window.APP_ROOT = {{ request.script_root|tojson }};</script>
  <script src="{{ url_for('static', filename='js/admin.js') }}" defer></script>
</body>
</html>
