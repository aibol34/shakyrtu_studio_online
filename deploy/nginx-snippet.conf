# Подключите в server { } вашего домена (или отдельный файл в sites-enabled).
# Для корня сайта (без префикса) — замените /gallery/ на / и уберите X-Forwarded-Prefix.
# Для подпути /gallery/ в .env: BEHIND_REVERSE_PROXY=1

location = /gallery {
    return 301 https://$host/gallery/;
}

location /gallery/ {
    proxy_pass http://127.0.0.1:8010/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /gallery;
    proxy_read_timeout 300s;
    client_max_body_size 50M;
}
